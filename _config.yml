title: "SOF 2026 | AI-Enabled SOC Briefing"
description: "AI-Enabled SOC with Microsoft Industry Solutions Security – 2026 Update"
baseurl: "/SOFv2site"
url: ""

theme: just-the-docs

# Aux links (top-right of page)
aux_links:
  "View on GitHub":
    - "https://github.com/extremetray3/SOFv2site"

# Navigation structure
nav_order: true

# Enable search
search_enabled: true
search.button: true

# Color scheme
color_scheme: dark

# Footer
footer_content: "SOF 2026 | AI-Enabled SOC Briefing. Built with Just the Docs."

# Back to top link
back_to_top: true
back_to_top_text: "Back to top"

# Callouts
callouts:
  note:
    title: Note
    color: blue
  references:
    title: References
    color: purple
  warning:
    title: Warning
    color: red
  important:
    title: Important
    color: yellow

# Exclude non-site files
exclude:
  - "*.xlsx"
  - "*.docx"
  - "*.py"
  - extracted
  - .venv
  - vendor
  - README.md
