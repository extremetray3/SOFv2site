<!-- Collapse on-page TOC by default -->
<script>
(function() {
  function collapseTOC() {
    var details = document.querySelectorAll('.main-content details');
    for (var i = 0; i < details.length; i++) {
      var summary = details[i].querySelector('summary');
      if (summary && /table of contents/i.test(summary.textContent)) {
        details[i].removeAttribute('open');
        details[i].classList.add('toc-collapsed');
      }
    }
  }
  document.addEventListener('DOMContentLoaded', function() {
    collapseTOC();
    setTimeout(collapseTOC, 100);
    setTimeout(collapseTOC, 500);
  });
})();
</script>
